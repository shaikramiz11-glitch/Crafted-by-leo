    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6c63ff;
            --secondary: #00d4ff;
            --accent: #ff6b6b;
            --neon: #00ff88;
            --dark: #0a0a0a;
            --darker: #050505;
            --glass: rgba(255,255,255,0.03);
        }
        html { scroll-behavior: smooth; }
        html::-webkit-scrollbar { width: 8px; }
        html::-webkit-scrollbar-track { background: var(--dark); }
        html::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--dark);
            color: #fff;
            overflow-x: hidden;
            cursor: none;
        }

        .cursor {
            position: fixed; width: 20px; height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%; pointer-events: none;
            z-index: 100000;
            transition: transform 0.2s, background 0.3s, border-color 0.3s;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
        }
        .cursor-follower {
            position: fixed; width: 45px; height: 45px;
            border: 1px solid rgba(108,99,255,0.2);
            border-radius: 50%; pointer-events: none;
            z-index: 99999;
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), width 0.3s, height 0.3s;
            transform: translate(-50%, -50%);
        }
        .cursor.hover { transform: translate(-50%,-50%) scale(2.5); background: rgba(108,99,255,0.3); border-color: var(--secondary); }
        .cursor-follower.hover { width: 70px; height: 70px; border-color: rgba(0,212,255,0.2); }

        .preloader {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--darker);
            z-index: 999999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .preloader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .loader-3d {
            width: 80px; height: 80px;
            perspective: 250px;
            margin-bottom: 40px;
        }
        .loader-cube {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: cubeRotate 2.5s infinite ease-in-out;
        }
        .loader-cube div {
            position: absolute; width: 80px; height: 80px;
            border: 2px solid var(--primary);
            background: rgba(108,99,255,0.05);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-size: 1.5rem;
            color: var(--primary); font-weight: 800;
        }
        .loader-cube .front  { transform: translateZ(40px); }
        .loader-cube .back   { transform: rotateY(180deg) translateZ(40px); }
        .loader-cube .right  { transform: rotateY(90deg) translateZ(40px); }
        .loader-cube .left   { transform: rotateY(-90deg) translateZ(40px); }
        .loader-cube .top    { transform: rotateX(90deg) translateZ(40px); }
        .loader-cube .bottom { transform: rotateX(-90deg) translateZ(40px); }
        @keyframes cubeRotate {
            0%   { transform: rotateX(0) rotateY(0) rotateZ(0); }
            33%  { transform: rotateX(180deg) rotateY(90deg) rotateZ(45deg); }
            66%  { transform: rotateX(270deg) rotateY(180deg) rotateZ(90deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(0); }
        }

        .loader-brand {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem; font-weight: 800;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .loader-bar-track {
            width: 250px; height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px; overflow: hidden;
        }
        .loader-bar {
            width: 0; height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--neon));
            border-radius: 10px;
            animation: loadProgress 2.8s ease-in-out forwards;
        }
        @keyframes loadProgress { to { width: 100%; } }
        .loader-percent {
            margin-top: 15px;
            font-size: 0.85rem; color: #555;
            letter-spacing: 3px;
        }

        .navbar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 25px 60px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10000;
            transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .navbar.scrolled {
            padding: 18px 60px;
            background: rgba(5,5,5,0.85);
            backdrop-filter: blur(30px) saturate(180%);
            border-bottom: 1px solid rgba(108,99,255,0.08);
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-decoration: none;
        }
        .logo span { font-weight: 400; opacity: 0.7; }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a {
            color: #777; text-decoration: none;
            font-size: 0.85rem; letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s; position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute;
            bottom: -8px; left: 0;
            width: 0; height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
        }
        .nav-links a:hover { color: #fff; }
        .nav-links a:hover::after { width: 100%; }

        .nav-cta {
            padding: 12px 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; border-radius: 50px;
            color: #fff; font-family: 'Space Grotesk', sans-serif;
            font-weight: 600; font-size: 0.9rem;
            cursor: none; transition: all 0.3s;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(108,99,255,0.3);
        }
        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(108,99,255,0.5);
        }

        .hamburger { display: none; flex-direction: column; gap: 7px; cursor: none; z-index: 10001; padding: 5px; background: none; border: none; }
        .hamburger span { width: 30px; height: 2px; background: #fff; transition: all 0.3s; display: block; }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

        .mobile-menu {
            position: fixed; top: 0; right: -100%;
            width: 100%; height: 100%;
            background: rgba(5,5,5,0.98);
            backdrop-filter: blur(30px);
            z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 35px;
            transition: right 0.6s cubic-bezier(0.16,1,0.3,1);
        }
        .mobile-menu.open { right: 0; }
        .mobile-menu a {
            color: #fff; text-decoration: none;
            font-family: 'Syne', sans-serif;
            font-size: 2rem; font-weight: 700;
            transition: color 0.3s;
            letter-spacing: 3px;
        }
        .mobile-menu a:hover { color: var(--primary); }

        .hero {
            position: relative; width: 100%; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        #hero-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }
        .hero-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, var(--dark) 70%);
            z-index: 2; pointer-events: none;
        }
        .hero-content {
            position: relative; z-index: 3;
            text-align: center; max-width: 950px;
            padding: 0 20px;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 28px;
            border: 1px solid rgba(108,99,255,0.25);
            border-radius: 50px;
            font-size: 0.82rem; letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 35px;
            backdrop-filter: blur(10px);
            background: rgba(108,99,255,0.05);
            animation: badgePulse 3s ease-in-out infinite;
        }
        .hero-badge .pulse-dot {
            width: 8px; height: 8px;
            background: var(--neon);
            border-radius: 50%;
            animation: dotPulse 1.5s infinite;
        }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.5); }
            50% { box-shadow: 0 0 0 8px rgba(0,255,136,0); }
        }
        @keyframes badgePulse {
            0%, 100% { border-color: rgba(108,99,255,0.25); }
            50% { border-color: rgba(108,99,255,0.5); }
        }

        .hero-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.8rem, 7vw, 6rem);
            font-weight: 800; line-height: 1.05;
            margin-bottom: 28px;
        }
        .hero-title .line { display: block; overflow: hidden; }
        .hero-title .line-inner { display: block; transform: translateY(110%); animation: lineReveal 1s forwards cubic-bezier(0.16,1,0.3,1); }
        .hero-title .line:nth-child(2) .line-inner { animation-delay: 0.15s; }
        .hero-title .line:nth-child(3) .line-inner { animation-delay: 0.3s; }
        @keyframes lineReveal { to { transform: translateY(0); } }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent), var(--neon));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero-desc {
            font-size: 1.15rem; color: #777;
            line-height: 1.9; margin-bottom: 45px;
            max-width: 580px; margin-left: auto; margin-right: auto;
            opacity: 0; animation: fadeUp 1s 0.6s forwards;
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
            from { transform: translateY(20px); }
        }

        .hero-buttons {
            display: flex; gap: 20px;
            justify-content: center; flex-wrap: wrap;
            opacity: 0; animation: fadeUp 1s 0.8s forwards;
        }
        .btn-primary {
            padding: 18px 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; border-radius: 60px;
            color: #fff; font-size: 1rem; font-weight: 600;
            cursor: none; transition: all 0.4s;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 12px;
            font-family: 'Space Grotesk', sans-serif;
            box-shadow: 0 8px 30px rgba(108,99,255,0.4);
            position: relative; overflow: hidden;
        }
        .btn-primary::before {
            content: ''; position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn-primary:hover::before { left: 100%; }
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(108,99,255,0.6);
        }
        .btn-outline {
            padding: 18px 45px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 60px;
            color: #fff; font-size: 1rem; font-weight: 600;
            cursor: none; transition: all 0.4s;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 12px;
            font-family: 'Space Grotesk', sans-serif;
        }
        .btn-outline:hover {
            border-color: var(--primary);
            background: rgba(108,99,255,0.08);
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(108,99,255,0.2);
        }

        .scroll-indicator {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); z-index: 3;
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
        }
        .scroll-text {
            font-size: 0.7rem; letter-spacing: 4px;
            text-transform: uppercase; color: #444;
        }
        .scroll-line {
            width: 1px; height: 50px;
            background: linear-gradient(to bottom, var(--primary), transparent);
            animation: scrollPulse 2s infinite;
        }
        @keyframes scrollPulse {
            0% { transform: scaleY(0); transform-origin: top; opacity: 1; }
            50% { transform: scaleY(1); transform-origin: top; opacity: 1; }
            51% { transform: scaleY(1); transform-origin: bottom; }
            100% { transform: scaleY(0); transform-origin: bottom; opacity: 1; }
        }

        .marquee {
            padding: 25px 0; overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            background: rgba(108,99,255,0.015);
        }
        .marquee-track {
            display: flex; width: max-content;
            animation: marqueeScroll 25s linear infinite;
        }
        .marquee-item {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem; font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: rgba(255,255,255,0.06);
            white-space: nowrap; padding: 0 25px;
            display: flex; align-items: center; gap: 25px;
        }
        .marquee-item .dot {
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%; opacity: 0.5;
            flex-shrink: 0;
        }
        @keyframes marqueeScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        section { padding: 130px 80px; position: relative; }
        .section-header { margin-bottom: 60px; }
        .section-label {
            font-size: 0.82rem; letter-spacing: 5px;
            text-transform: uppercase; color: var(--primary);
            margin-bottom: 18px;
            display: flex; align-items: center; gap: 15px;
        }
        .section-label::before {
            content: ''; width: 40px; height: 1px;
            background: linear-gradient(90deg, var(--primary), transparent);
        }
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 4.5vw, 3.8rem);
            font-weight: 800; line-height: 1.15;
            margin-bottom: 18px;
        }
        .section-desc {
            font-size: 1.05rem; color: #777;
            line-height: 1.9; max-width: 550px;
        }

        .about-section { overflow: hidden; }
        .about-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 100px; align-items: center;
        }
        .about-visual { position: relative; height: 550px; display: flex; align-items: center; justify-content: center; }
        .about-main-card {
            width: 320px; height: 380px;
            background: linear-gradient(135deg, rgba(108,99,255,0.08), rgba(0,212,255,0.03));
            border: 1px solid rgba(108,99,255,0.15);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .about-main-card::before {

            background: var(--primary); border-radius: 50%;

        .about-main-card::after {

            font-size: 12rem; font-weight: 800;
            color: rgba(108,99,255,0.05);
        }
        .about-main-card .card-inner-icon { font-size: 5rem; color: var(--primary); opacity: 0.15; position: relative; z-index: 1; }

        .floating-tag {
            position: absolute;
            padding: 14px 22px;
            background: rgba(10,10,10,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .floating-tag:nth-child(2) { top: 30px; right: -10px; animation: floatA 4s ease-in-out infinite; }
        .floating-tag:nth-child(3) { bottom: 80px; left: -20px; animation: floatA 4s 0.8s ease-in-out infinite; }
        .floating-tag:nth-child(4) { bottom: 10px; right: 20px; animation: floatA 4s 1.6s ease-in-out infinite; }
        .floating-tag:nth-child(5) { top: 60px; left: -30px; animation: floatA 4s 2.2s ease-in-out infinite; }
        @keyframes floatA {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
